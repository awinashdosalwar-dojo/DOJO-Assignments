name: Build & Deploy .NET App to Azure Web App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH:  './src/DotNetDemoApp/DotNetDemoApp.csproj'
  TEST_PATH:     './src/DotNetDemoApp.Tests/DotNetDemoApp.Tests.csproj'
  PUBLISH_PATH:  './publish'
  TEST_RESULTS:  './TestResults'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Run tests
        run: |
          if [ -f "${{ env.TEST_PATH }}" ]; then
            echo "TEST_EXISTS=true" >> $GITHUB_ENV
            mkdir -p ${{ env.TEST_RESULTS }}
            dotnet test ${{ env.TEST_PATH }} \
              --configuration Release \
              --logger "trx;LogFileName=test-results.trx" \
              --results-directory ${{ env.TEST_RESULTS }}
          else
            echo "TEST_EXISTS=false" >> $GITHUB_ENV
            echo "No test project found — skipping."
          fi

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: env.TEST_EXISTS == 'true' && always()
        with:
          files: '${{ env.TEST_RESULTS }}/**/*.trx'
          check_name: '.NET Test Results'
          comment_mode: always
          fail_on: 'test failures'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: env.TEST_EXISTS == 'true' && always()
        with:
          name: test-results-${{ github.sha }}
          path: ${{ env.TEST_RESULTS }}
          retention-days: 7

      - name: Publish app
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --output ${{ env.PUBLISH_PATH }} \
            --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app-${{ github.sha }}
          path: ${{ env.PUBLISH_PATH }}
          retention-days: 3

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app-${{ github.sha }}
          path: ${{ env.PUBLISH_PATH }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package:  ${{ env.PUBLISH_PATH }}

      - name: Health check
        run: |
          URL="${{ steps.deploy.outputs.webapp-url }}"
          for i in {1..8}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            [[ "$STATUS" == "200" ]] && echo "Healthy!" && exit 0
            sleep 10
          done
          echo "Health check failed" && exit 1

      - name: Azure Logout
        if: always()
        run: az logout