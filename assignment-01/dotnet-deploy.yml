name: Build & Deploy .NET App to Azure Web App

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]           # auto-deploy on every push to main
  pull_request:
    branches: [ main ]           # build + test on PRs (no deploy)
  workflow_dispatch:             # allow manual trigger from GitHub UI

# ── Environment Variables ─────────────────────────────────────────────────────
env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: './src/DotNetDemoApp/DotNetDemoApp.csproj'   # ← update this
  PUBLISH_PATH: './publish'

# =============================================================================
jobs:

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build & Test
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Show folder structure
        run: |
         pwd
         ls -R

      - name: Restore
        run: dotnet restore
        
      - name: Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build (Release)
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Run unit tests
        run: |
          dotnet test ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Test Results
          path: '**/*.trx'
          reporter: dotnet-trx

      - name: Publish app (Release)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --output ${{ env.PUBLISH_PATH }} \
            --no-build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app-${{ github.sha }}
          path: ${{ env.PUBLISH_PATH }}
          retention-days: 3

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy to Azure Web App
# Only runs on push to main (not on PRs)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app-${{ github.sha }}
          path: ${{ env.PUBLISH_PATH }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}     # set in GitHub secrets
          package:  ${{ env.PUBLISH_PATH }}

      - name: Health check after deploy
        run: |
          URL="${{ steps.deploy.outputs.webapp-url }}"
          echo "Checking: $URL"
          for i in {1..8}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            [[ "$STATUS" == "200" ]] && echo "✅ App is healthy!" && exit 0
            sleep 10
          done
          echo "❌ Health check failed" && exit 1

      - name: Deployment summary
        run: |
          echo "### ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|--|--|" >> $GITHUB_STEP_SUMMARY
          echo "| **App** | ${{ secrets.AZURE_WEBAPP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ steps.deploy.outputs.webapp-url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      - name: Azure Logout
        if: always()
        run: az logout
